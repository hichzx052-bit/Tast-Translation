name: Build Update Manager APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UpdateManager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v3
      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with: { name: UpdateManager-APK, path: UpdateManager/app/build/outputs/apk/release/*.apk }

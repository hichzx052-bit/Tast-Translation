name: Build APKs
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-translator:
    name: "ترجمة هشام APK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TranslatedByHisham
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Create Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
      - name: Create local.properties
        run: echo "sdk.dir=\$ANDROID_SDK_ROOT" > local.properties
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TranslatedByHisham-APK
          path: TranslatedByHisham/app/build/outputs/apk/release/*.apk

  build-update-manager:
    name: "Update Manager APK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UpdateManager
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Create Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
      - name: Create local.properties
        run: echo "sdk.dir=\$ANDROID_SDK_ROOT" > local.properties
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UpdateManager-APK
          path: UpdateManager/app/build/outputs/apk/release/*.apk
